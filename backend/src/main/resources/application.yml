spring:
  application:
    name: cryptofolio-api
  profiles:
    default: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cryptofolio_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    com.cryptofolio: DEBUG
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

coingecko:
  base-url: ${COINGECKO_BASE_URL:https://api.coingecko.com/api/v3}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:cryptofolio-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  flyway:
    enabled: false

logging:
  level:
    root: WARN
    com.cryptofolio: INFO

jwt:
  secret: 0123456789abcdef0123456789abcdef
  expiration-ms: 86400000

coingecko:
  base-url: https://api.coingecko.com/api/v3

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:${PORT:8081}}

logging:
  level:
    com.cryptofolio: INFO
    org.springframework: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

coingecko:
  base-url: ${COINGECKO_BASE_URL:https://api.coingecko.com/api/v3}
