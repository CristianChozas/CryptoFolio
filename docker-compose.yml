services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptofolio-api
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/cryptofolio_dev
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: 0123456789abcdef0123456789abcdef
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: cryptofolio-db
    environment:
      POSTGRES_DB: cryptofolio_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cryptofolio_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cryptofolio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cryptofolio.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
